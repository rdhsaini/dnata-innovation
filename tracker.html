<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dnata · Global Network Initiative Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F4F6FA;color:#1A2B4A;font-size:13px;-webkit-font-smoothing:antialiased;margin:0;padding:0}
:root{
  --navy:#0D1B3E;--gold:#C9A84C;--bg:#F4F6FA;--surface:#fff;--border:#E2E8F0;--muted:#7A90B0;--text:#1A2B4A;
  --blue:#2060C8;--blue-lt:#EBF1FC;--teal:#0B7A63;--teal-lt:#E4F4F0;
  --purple:#6B35C4;--purple-lt:#EEE8FA;--amber:#C47A0A;--amber-lt:#FEF3DC;
  --green:#1A7A45;--green-lt:#E3F5EB;--slate:#8899B4;--slate-lt:#EDF0F5;
}
.hband{background:var(--navy);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;width:100%}
.htl{display:flex;align-items:center;gap:10px}
.bpill{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:99px;padding:2px 9px}
.htitle{font-size:16px;font-weight:600;color:#fff}
.hsub{font-size:10px;color:rgba(255,255,255,.4);margin-top:1px}
.wchip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 14px;text-align:center}
.wlbl{font-size:8px;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase}
.wval{font-size:12px;font-weight:600;color:#fff}
.page{max-width:1100px;margin:0 auto;padding:20px 24px}
.twrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:visible;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th,td{border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
th:last-child,td:last-child{border-right:none}
tr:last-child td{border-bottom:none}
thead th{background:var(--navy);color:#fff;font-size:9px;font-weight:600;letter-spacing:.06em;text-align:center;padding:11px 8px}
thead th.ihd{text-align:left;padding-left:14px;width:190px}
td.ic{padding:0;width:190px}
.ii{display:flex;align-items:center;gap:8px;padding:13px 14px;position:relative}
.ibar{position:absolute;left:0;top:0;bottom:0;width:3px}
.inum{font-size:8px;font-weight:700;color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.iname{font-size:12px;font-weight:600;color:var(--text)}
td.sc{text-align:center;padding:11px 6px;position:relative;overflow:visible}
td.sc:hover{z-index:400}
tbody tr:nth-child(even) td{background:#FAFBFD}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;border:1px solid;font-size:10.5px;font-weight:600;white-space:nowrap;position:relative}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pip{background:var(--amber-lt);color:var(--amber);border-color:#E8B84B}
.pdc{background:var(--blue-lt);color:var(--blue);border-color:#7AAAE8}
.plv{background:var(--green-lt);color:var(--green);border-color:#7AC89A}
.pna{background:var(--slate-lt);color:var(--slate);border-color:#C8D4E0}
.pbl{background:transparent;color:#CCC;border-color:#E8EDF4}
.ht{cursor:help;transition:box-shadow .12s}
.ht:hover{box-shadow:0 2px 10px rgba(0,0,0,.12)}
.tip{
  display:none;position:absolute;z-index:500;
  top:calc(100% + 10px);left:50%;transform:translateX(-50%);
  background:#fff;color:var(--text);
  font-size:11px;line-height:1.55;
  padding:10px 13px;border-radius:9px;
  min-width:180px;max-width:240px;
  box-shadow:0 8px 28px rgba(13,27,62,.16);
  border:1px solid var(--border);
  border-top:3px solid var(--gold);
  pointer-events:none;white-space:normal;text-align:left;
}
.tip::before{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:var(--gold)}
.tlbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;display:block}
.ht:hover .tip{display:block}
.footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.legend{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.ld{width:7px;height:7px;border-radius:50%}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:10px}
.spin{width:26px;height:26px;border:2.5px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hband,.twrap,.footer{opacity:0;animation:up .4s ease forwards}
.twrap{animation-delay:.08s}.footer{animation-delay:.16s}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><div style="font-size:12px;color:var(--muted)">Loading tracker...</div></div>
<div id="app" style="display:none">

<div class="hband">
  <div class="htl">
    <span class="bpill">Innovation & Digitalisation</span>
    <div>
      <div class="htitle">Global Network Initiative Tracker</div>
      <div class="hsub">dnata Cargo · Hover any status tile to see details</div>
    </div>
  </div>
  <div class="wchip">
    <div class="wlbl">Week of</div>
    <div class="wval" id="wval">Apr 2026</div>
  </div>
</div>

<div class="page">
  <div class="twrap">
    <table id="tbl">
      <thead><tr id="thead-row"><th class="ihd">Initiative</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="footer">
    <div class="legend">
      <span style="font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-right:2px">Status</span>
      <div class="li"><div class="ld" style="background:var(--amber)"></div>In Progress</div>
      <div class="li"><div class="ld" style="background:var(--blue)"></div>Discovery</div>
      <div class="li"><div class="ld" style="background:var(--green)"></div>Live</div>
      <div class="li"><div class="ld" style="background:var(--slate)"></div>N/A</div>
    </div>
    <div style="font-size:10px;color:var(--muted);font-style:italic">Innovation & Digitalisation · dnata Cargo · Confidential</div>
  </div>
</div>
</div>

<script>
const SM = {
  ip:{ cls:'pip', dot:'#C47A0A', label:'In Progress',
    def:'Actively running at this station. Requirements defined, vendor engaged or equipment deployed.' },
  dc:{ cls:'pdc', dot:'#2060C8', label:'Discovery',
    def:'Scoping phase in progress. Functional requirements being gathered and vendor landscape reviewed.' },
  lv:{ cls:'plv', dot:'#1A7A45', label:'Live',
    def:'Solution fully deployed and operational. Monitoring KPIs and gathering performance feedback.' },
  na:{ cls:'pna', dot:'#8899B4', label:'N/A',
    def:'Not in scope for this station at this time.' },
  bl:{ cls:'pbl', dot:'#DDD', label:'—', def:'' },
};

const DEF = {
  week:'Apr 2026',
  countries:['UK','Iraq','US','AE','Swiss','ZNZ','PAK','AMS','BEL'],
  initiatives:[
    {num:'01',title:'Dimensioning PoC',    color:'#2060C8'},
    {num:'02',title:'Market Intelligence', color:'#0B7A63'},
    {num:'03',title:'ADM / TMS',           color:'#6B35C4'},
    {num:'04',title:'[Initiative 4]',      color:'#C47A0A'},
    {num:'05',title:'[Initiative 5]',      color:'#A0348A'},
  ],
  statuses:[
    ['ip','na','dc','dc','na','na','na','na','na'],
    ['dc','na','na','dc','na','na','na','na','na'],
    ['dc','na','na','ip','na','na','dc','dc','dc'],
    ['bl','bl','bl','bl','bl','bl','bl','bl','bl'],
    ['bl','bl','bl','bl','bl','bl','bl','bl','bl'],
  ],
  blurbs:{}
};

function render(D) {
  document.getElementById('wval').textContent = D.week || 'Apr 2026';

  const hr = document.getElementById('thead-row');
  hr.innerHTML = '<th class="ihd">Initiative</th>';
  (D.countries||[]).filter(c => c.toLowerCase() !== 'initiative').forEach(c => {
    const th = document.createElement('th');
    th.textContent = c;
    hr.appendChild(th);
  });

  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  (D.initiatives||[]).forEach((ini,ri) => {
    const tr = document.createElement('tr');
    const tdI = document.createElement('td');
    tdI.className = 'ic';
    tdI.innerHTML = `<div class="ii">
      <div class="ibar" style="background:${ini.color}"></div>
      <div class="inum" style="background:${ini.color}">${ini.num}</div>
      <div class="iname">${ini.title}</div>
    </div>`;
    tr.appendChild(tdI);

    (D.countries||[]).forEach((_,ci) => {
      const st   = (D.statuses[ri]||[])[ci]||'bl';
      const meta = SM[st]||SM.bl;
      const blurb= (D.blurbs||{})[`${ri}-${ci}`]||'';
      const tip  = blurb || meta.def;
      const hasTip = tip && st !== 'bl';
      const td = document.createElement('td');
      td.className = 'sc';
      td.innerHTML = `<span class="pill ${meta.cls}${hasTip?' ht':''}">
        <span class="dot" style="background:${meta.dot}"></span>${meta.label}
        ${hasTip?`<span class="tip"><span class="tlbl">${meta.label}</span>${tip}</span>`:''}
      </span>`;
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
}

async function load() {
  let D = DEF;
  try {
    const r = await fetch('/api/load');
    const d = await r.json();
    if (d.ok && d.content) {
      const saved = typeof d.content==='string' ? JSON.parse(d.content) : d.content;
      if (saved && saved.countries) D = saved;
    }
  } catch(e) {}
  render(D);
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

load();
</script>
</body>
</html>
